<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFID Nexus | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        body{
            font-family:'Inter',sans-serif;
            background:radial-gradient(circle at top,#111827 0,#020617 45%,#000 100%);
            color:#e5e7eb;
        }
        .glass{
            background:rgba(15,23,42,0.85);
            backdrop-filter:blur(20px);
            border:1px solid rgba(148,163,184,0.35);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full glass rounded-3xl p-10 shadow-2xl border-slate-700/60">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-semibold tracking-tight text-slate-50">Noctra Heritage Vault</h1>
            <p class="mt-2 text-xs uppercase tracking-[0.25em] text-slate-400">Secure Operator Console</p>
        </div>
        {% if error %}
        <div class="mb-4 text-xs text-red-300 bg-red-900/40 border border-red-500/40 rounded-xl px-4 py-3">
            {{ error }}
        </div>
        {% endif %}
        <form method="post" class="space-y-6">
            <div>
                <label class="block text-xs font-medium text-slate-300 mb-1">Username</label>
                <input name="username" autocomplete="username" required
                    class="w-full px-4 py-3 rounded-2xl bg-slate-900/60 border border-slate-600/70 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-amber-400"
                    placeholder="agent or sales">
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-300 mb-1">Password</label>
                <input name="password" type="password" autocomplete="current-password" required
                    class="w-full px-4 py-3 rounded-2xl bg-slate-900/60 border border-slate-600/70 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-amber-400"
                    placeholder="password">
            </div>
            <div class="text-[11px] text-slate-400 bg-slate-900/40 border border-slate-700/60 rounded-2xl px-4 py-3 leading-relaxed">
                <p class="font-semibold mb-1 text-slate-200">Demo credentials</p>
                <p><span class="font-mono text-amber-300">agent / password</span> – Wallet top‑up operator</p>
                <p><span class="font-mono text-amber-300">sales / password</span> – Salesperson checkout</p>
            </div>
            <button type="submit"
                class="w-full py-3 rounded-2xl bg-amber-400 text-slate-900 text-xs font-semibold tracking-[0.3em] uppercase hover:bg-amber-300 transition-colors">
                Enter Vault
            </button>
        </form>
    </div>
</body>
</html>
